<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Prateek | Portfolio</title>

  <style>
    /* Reset and Core Layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000; /* Matches your portfolio theme */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Full-screen wrapper */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Mobile dynamic viewport fix (iOS) */
    @supports (-webkit-touch-callout: none) {
      .iframe-wrapper {
        height: 100dvh;
      }
    }

    iframe {
      width: 100%;
      flex-grow: 1;
      border: none;
      display: block;
    }

    /* Fallback Link (Only shows if iframe fails or for accessibility) */
    .fallback-msg {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .fallback-msg:hover {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="iframe-wrapper">
    <iframe
      src="https://infistudy.github.io/Prateek-portfolio-/"
      loading="eager"
      title="Prateek Portfolio"
      /* CRITICAL FIX: 
         - allow-popups: lets links open in new tabs 
         - allow-popups-to-escape-sandbox: stops the new tab from being blocked
         - allow-top-navigation: lets links change the current page if needed
      */
      sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-top-navigation"
      allowfullscreen>
    </iframe>

    <a href="https://infistudy.github.io/Prateek-portfolio-/" class="fallback-msg" target="_blank">
      Trouble viewing? Click here to open directly.
    </a>
  </div>

</body>
</html>
