<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <title>Prateek | Portfolio</title>
  <meta name="description" content="Portfolio of Prateek - Showcasing projects and skills.">
  <meta property="og:title" content="Prateek | Portfolio">
  <meta property="og:description" content="Check out my latest work and projects.">
  <meta property="og:image" content="https://infistudy.github.io/Prateek-portfolio-/preview.png"> <style>
    :root {
      --bg-color: #000;
      --accent-color: #007aff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body, html {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow: hidden;
      font-family: sans-serif;
    }

    /* Loading Spinner Styling */
    .loader-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99;
      background: var(--bg-color);
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Iframe Styling */
    .iframe-wrapper {
      width: 100%;
      height: 100vh;
      height: 100dvh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0; /* Hidden until loaded */
      transition: opacity 0.8s ease;
    }

    .iframe-loaded iframe {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="loader" class="loader-container">
    <div class="spinner"></div>
  </div>

  <div class="iframe-wrapper" id="wrapper">
    <iframe
      id="portfolio-frame"
      src="https://infistudy.github.io/Prateek-portfolio-/"
      sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms allow-top-navigation"
      allowfullscreen
      onload="handleLoad()">
    </iframe>
  </div>

  <script>
    function handleLoad() {
      // Hide loader and show iframe smoothly
      document.getElementById('loader').style.opacity = '0';
      document.getElementById('wrapper').classList.add('iframe-loaded');
      
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
      }, 500);
    }
  </script>

</body>
</html>
